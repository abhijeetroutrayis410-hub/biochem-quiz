<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Biochemistry CBT Mock Test</title>

<style>
body{
font-family:Arial;
max-width:900px;
margin:auto;
padding:20px;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
}

.palette button{
width:42px;
height:42px;
margin:4px;
border-radius:12px;
}

.answered{
background:#c8f7c5;
font-weight:bold;
}

.box{
border:1px solid #ccc;
padding:18px;
border-radius:18px;
margin-top:20px;
}

.opt{
display:block;
width:100%;
padding:12px;
margin:8px 0;
border-radius:12px;
border:1px solid #999;
background:#fff;
cursor:pointer;
}

.opt:hover{ background:#f3f3f3; }

.nav{
display:flex;
gap:10px;
margin-top:20px;
flex-wrap:wrap;
}

.panel{
margin-top:20px;
padding:15px;
border:1px solid #ddd;
border-radius:12px;
}

.small{
font-size:14px;
color:#444;
}
</style>
</head>

<body>

<div id="loginBox">
<h2>Enter Candidate Name</h2>
<input id="studentName" placeholder="Your name">
<br><br>
<button onclick="startExam()">Start Exam</button>
</div>

<div id="examArea" style="display:none;">

<div class="top">
<h1>Biochemistry CBT Mock</h1>
<h2 id="timer">20:00</h2>
</div>

<div class="palette" id="palette"></div>

<div class="box">

<h3 id="qtext"></h3>
<div id="opts"></div>

<div class="nav">
<button onclick="prevQ()">Previous</button>
<button onclick="nextQ()">Next</button>
<button onclick="submitExam()">Submit</button>
<button onclick="showReview()">Review Panel</button>
</div>

</div>

<div id="reviewPanel" class="panel"></div>
<div id="analytics" class="panel"></div>
<div id="leaderboard" class="panel"></div>
<div id="result"></div>

</div>

<script>

/* ================= QUESTIONS ================= */
const qs=[
{q:'Rate-limiting enzyme of glycolysis?',o:['Hexokinase','PFK-1','Pyruvate kinase','Aldolase'],a:1},
{q:'Net ATP produced in glycolysis?',o:['2 ATP','4 ATP','6 ATP','8 ATP'],a:0},
{q:'G6PD deficiency affects?',o:['Glycolysis','HMP shunt','TCA cycle','Gluconeogenesis'],a:1},
{q:'Site of ketone body formation?',o:['Liver','Brain','Kidney','Muscle'],a:0},
{q:'Final electron acceptor in ETC?',o:['NADH','Oxygen','FADH2','Cytochrome c'],a:1},
{q:'Uncoupler of oxidative phosphorylation?',o:['Cyanide','Rotenone','2,4-DNP','Malonate'],a:2},
{q:'Km indicates?',o:['Enzyme affinity','Vmax','pH','Turnover number'],a:0},
{q:'Deficiency of insulin causes?',o:['Glycogenesis','Diabetes mellitus','Ketolysis','Hypoglycemia'],a:1},
{q:'Rate-limiting enzyme of cholesterol synthesis?',o:['HMG-CoA reductase','Lipase','Thiokinase','Citrate synthase'],a:0},
{q:'End product of purine metabolism?',o:['Urea','Uric acid','Creatinine','Bilirubin'],a:1}
];

/* ================= TOPICS (for analytics only) ================= */
const topics=[
"Carbohydrate metabolism",
"Carbohydrate metabolism",
"Carbohydrate metabolism",
"Lipid metabolism",
"ETC",
"ETC",
"Enzymology",
"Endocrine",
"Lipid metabolism",
"Nucleotide metabolism"
];

/* ================= STATE ================= */
let idx=0;
let ans=Array(qs.length).fill(null);
let t=1200;
let submitted=false;
let timerInterval;

/* ================= AUTO SAVE ================= */
function saveState(){
localStorage.setItem("cbt_state", JSON.stringify({
idx, ans, t, submitted
}));
}

/* ================= LOAD STATE ================= */
function loadState(){
let data=localStorage.getItem("cbt_state");
if(data){
let d=JSON.parse(data);
idx=d.idx;
ans=d.ans;
t=d.t;
submitted=d.submitted;
}
}

/* ================= TIMER ================= */
function startTimer(){

timerInterval=setInterval(()=>{

if(t<=0){
clearInterval(timerInterval);
submitExam();
return;
}

t--;
saveState();

let m=Math.floor(t/60);
let s=t%60;

document.getElementById('timer').innerText=
(m<10?'0':'')+m+':'+(s<10?'0':'')+s;

},1000);

}

/* ================= PALLET ================= */
function renderPalette(){

let h='';
qs.forEach((q,i)=>{
h+=`
<button onclick="goQ(${i})" class="${ans[i]!=null?'answered':''}">
${i+1}
</button>`;
});

document.getElementById('palette').innerHTML=h;

}

/* ================= QUESTION ================= */
function renderQ(){

document.getElementById('qtext').innerText=
(idx+1)+'. '+qs[idx].q;

let h='';
qs[idx].o.forEach((v,j)=>{
h+=`
<button class="opt" onclick="pick(${j})">
${String.fromCharCode(65+j)}. ${v}
${ans[idx]===j?' ✓ Selected':''}
</button>`;
});

document.getElementById('opts').innerHTML=h;

renderPalette();
saveState();

}

/* ================= ANSWER ================= */
function pick(j){
if(submitted) return;
ans[idx]=j;
renderQ();
}

/* ================= NAV ================= */
function nextQ(){ if(idx<qs.length-1) idx++; renderQ(); }
function prevQ(){ if(idx>0) idx--; renderQ(); }
function goQ(i){ idx=i; renderQ(); }

/* ================= REVIEW PANEL ================= */
function showReview(){

let h="<h3>Question Review Panel</h3>";

qs.forEach((q,i)=>{
h+=`
<div class="small">
<b>Q${i+1}</b> - ${ans[i]!=null?'Answered':'Not Answered'}
<button onclick="goQ(${i})">Go</button>
</div>`;
});

document.getElementById('reviewPanel').innerHTML=h;

}

/* ================= ANALYTICS ================= */
function showAnalytics(){

let weak={};

qs.forEach((q,i)=>{
if(ans[i]!==q.a){
let t=topics[i];
weak[t]=(weak[t]||0)+1;
}
});

let h="<h3>Weak Topics Analysis</h3>";

for(let k in weak){
h+=`<div>${k}: ${weak[k]} wrong</div>`;
}

document.getElementById('analytics').innerHTML=h;

}

/* ================= LEADERBOARD ================= */
function updateLeaderboard(score,name){

let data=JSON.parse(localStorage.getItem("leaderboard")||"[]");

data.push({name,score});

data.sort((a,b)=>b.score-a.score);

data=data.slice(0,5);

localStorage.setItem("leaderboard",JSON.stringify(data));

let h="<h3>Leaderboard</h3>";

data.forEach((d,i)=>{
h+=`<div>${i+1}. ${d.name} - ${d.score}</div>`;
});

document.getElementById('leaderboard').innerHTML=h;

}

/* ================= SUBMIT ================= */
function submitExam(){

if(submitted) return;
submitted=true;

clearInterval(timerInterval);

let score=0;

ans.forEach((v,i)=>{
if(v===qs[i].a) score++;
});

let name=document.getElementById('studentName').value;

document.getElementById('result').innerHTML=
'<h2>Score: '+score+'/'+qs.length+'</h2>';

updateLeaderboard(score,name);
showAnalytics();
saveState();

}

/* ================= START ================= */
function startExam(){

let name=document.getElementById('studentName').value;
if(name==""){ alert("Enter name"); return; }

document.getElementById('loginBox').style.display='none';
document.getElementById('examArea').style.display='block';

document.querySelector('h1').innerHTML=
'Biochemistry CBT Mock<br><small>'+name+'</small>';

loadState();

startTimer();
renderQ();
showReview();

}

</script>

</body>
</html>
