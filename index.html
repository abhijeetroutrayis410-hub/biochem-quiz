<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Biochemistry CBT Fixed</title>

<style>
body{
font-family:Segoe UI;
max-width:900px;
margin:auto;
padding:20px;
background:linear-gradient(135deg,#eef2ff,#e6f0ff);
}

#loginBox{
background:white;
padding:20px;
border-radius:14px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
background:white;
padding:12px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

#timer{
background:#2b4eff;
color:white;
padding:8px 12px;
border-radius:10px;
font-weight:bold;
}

.box{
background:white;
margin-top:20px;
padding:20px;
border-radius:14px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.opt{
display:block;
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:1px solid #ccc;
cursor:pointer;
background:white;
transition:0.2s;
}

.opt:hover{
background:#f3f7ff;
border-color:#2b4eff;
}

/* ✅ SELECTED OPTION FIX */
.selected{
background:#2b4eff !important;
color:white !important;
border-color:#2b4eff !important;
}

.nav button{
margin:5px;
padding:10px 12px;
border:none;
border-radius:8px;
background:#2b4eff;
color:white;
cursor:pointer;
}

.palette button{
width:38px;
height:38px;
margin:4px;
border-radius:8px;
border:none;
cursor:pointer;
}

.answered{background:#4caf50;color:white;}
</style>
</head>

<body>

<div id="loginBox">
<h2>Biochemistry CBT Exam</h2>
<input id="name" placeholder="Enter Name">
<br><br>
<button onclick="start()">Start Exam</button>
</div>

<div id="exam" style="display:none;">

<div class="top">
<h2>CBT Exam</h2>
<div id="timer">20:00</div>
</div>

<div class="palette" id="palette"></div>

<div class="box">
<h3 id="q"></h3>
<div id="options"></div>

<div class="nav">
<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
<button onclick="submit()">Submit</button>
</div>
</div>

<div id="result"></div>

</div>

<script>

/* ================= QUESTIONS (10) ================= */
const qs=[
{q:"Rate limiting enzyme of glycolysis?",o:["Hexokinase","PFK-1","Pyruvate kinase","Aldolase"],a:1},
{q:"Net ATP in glycolysis?",o:["2","4","6","8"],a:0},
{q:"G6PD deficiency affects?",o:["Glycolysis","HMP shunt","TCA cycle","Gluconeogenesis"],a:1},
{q:"Ketone body formation site?",o:["Liver","Brain","Muscle","Kidney"],a:0},
{q:"Final electron acceptor in ETC?",o:["NADH","Oxygen","FADH2","Cytochrome c"],a:1},
{q:"Uncoupler of oxidative phosphorylation?",o:["Cyanide","Rotenone","2,4-DNP","Malonate"],a:2},
{q:"Km indicates?",o:["Enzyme affinity","Vmax","pH","Temperature"],a:0},
{q:"Insulin deficiency leads to?",o:["Hypoglycemia","Diabetes mellitus","Glycogenesis","Ketolysis"],a:1},
{q:"Rate limiting enzyme of cholesterol synthesis?",o:["HMG-CoA reductase","Lipase","Citrate synthase","Hexokinase"],a:0},
{q:"End product of purine metabolism?",o:["Urea","Uric acid","Creatinine","Ammonia"],a:1}
];

/* ================= STATE ================= */
let i=0;
let ans=Array(qs.length).fill(null);
let t=1200;
let timer;

/* ================= TIMER ================= */
function startTimer(){
timer=setInterval(()=>{
if(t<=0){submit();return;}

t--;

let m=Math.floor(t/60);
let s=t%60;

document.getElementById("timer").innerText=
String(m).padStart(2,'0')+":"+String(s).padStart(2,'0');

},1000);
}

/* ================= RENDER ================= */
function render(){

document.getElementById("q").innerText=(i+1)+". "+qs[i].q;

let h="";

qs[i].o.forEach((o,j)=>{

let sel = (ans[i]===j) ? "selected" : "";

h+=`
<button class="opt ${sel}" onclick="pick(${j})">
${o}
</button>`;
});

document.getElementById("options").innerHTML=h;
renderPalette();
}

/* ================= SELECT ANSWER ================= */
function pick(j){
ans[i]=j;
render();
}

/* ================= NAV ================= */
function next(){ if(i<qs.length-1)i++; render(); }
function prev(){ if(i>0)i--; render(); }

/* ================= PALETTE ================= */
function renderPalette(){
let h="";

qs.forEach((q,idx)=>{
h+=`
<button class="${ans[idx]!=null?'answered':''}" onclick="jump(${idx})">
${idx+1}
</button>`;
});

document.getElementById("palette").innerHTML=h;
}

function jump(x){ i=x; render(); }

/* ================= SUBMIT ================= */
function submit(){
clearInterval(timer);

let score=0;

qs.forEach((q,idx)=>{
if(ans[idx]===q.a) score++;
});

document.getElementById("result").innerHTML=`
<h2>Result: ${score}/${qs.length}</h2>
`;
}

/* ================= START ================= */
function start(){
let name=document.getElementById("name").value;
if(!name){alert("Enter name");return;}

document.getElementById("loginBox").style.display="none";
document.getElementById("exam").style.display="block";

startTimer();
render();
}

</script>

</body>
</html>
