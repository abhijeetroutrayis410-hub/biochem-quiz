<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Advanced Biochemistry CBT</title>

<style>
body{
font-family:Segoe UI, Arial;
max-width:950px;
margin:auto;
padding:20px;
background:linear-gradient(135deg,#eef2ff,#e8f0ff);
}

/* LOGIN */
#loginBox{
background:white;
padding:25px;
border-radius:16px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* HEADER */
.top{
display:flex;
justify-content:space-between;
align-items:center;
background:white;
padding:12px 18px;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

h1{
color:#2b4eff;
margin:0;
}

/* TIMER */
#timer{
padding:8px 14px;
border-radius:10px;
font-weight:bold;
background:#2b4eff;
color:white;
transition:0.3s;
}

/* WARNING TIMER */
.warn{
background:#ff3b3b !important;
}

/* BOX */
.box{
background:white;
padding:20px;
border-radius:16px;
margin-top:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

#qtext{
font-size:18px;
font-weight:600;
}

/* OPTIONS */
.opt{
display:block;
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:2px solid #ddd;
cursor:pointer;
background:white;
transition:0.2s;
}

.opt:hover{
border-color:#2b4eff;
background:#f3f7ff;
}

.selected{
background:#dbe7ff !important;
border-color:#2b4eff !important;
}

/* NAV */
.nav{
display:flex;
gap:10px;
margin-top:15px;
flex-wrap:wrap;
}

.nav button{
padding:10px 14px;
border:none;
border-radius:10px;
background:#2b4eff;
color:white;
cursor:pointer;
font-weight:600;
}

.nav button:hover{
background:#1f39c8;
}

/* PALETTE */
.palette{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-top:15px;
}

.palette button{
width:40px;
height:40px;
border-radius:10px;
border:none;
cursor:pointer;
font-weight:bold;
}

/* STATUS COLORS */
.notvisited{ background:#e0e0e0; }
.visited{ background:#ffd966; }
.answered{ background:#4caf50; color:white; }
.marked{ background:#ff9800; color:white; }

/* PANEL */
.panel{
background:white;
margin-top:20px;
padding:15px;
border-radius:14px;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

/* INPUT */
input{
padding:10px;
border-radius:10px;
border:1px solid #ccc;
width:60%;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<h2>Advanced CBT System</h2>
<input id="studentName" placeholder="Enter Name">
<br><br>
<button onclick="startExam()">Start Exam</button>
</div>

<!-- EXAM -->
<div id="examArea" style="display:none;">

<div class="top">
<h1>Biochemistry CBT</h1>
<h2 id="timer">20:00</h2>
</div>

<div class="palette" id="palette"></div>

<div class="box">
<h3 id="qtext"></h3>
<div id="opts"></div>

<div class="nav">
<button onclick="prevQ()">Prev</button>
<button onclick="nextQ()">Next</button>
<button onclick="mark()">Mark</button>
<button onclick="submitExam()">Submit</button>
</div>
</div>

<div id="result" class="panel"></div>

</div>

<script>

/* QUESTIONS */
const qs=[
{q:"Rate limiting enzyme of glycolysis?",o:["Hexokinase","PFK-1","Pyruvate kinase","Aldolase"],a:1},
{q:"Net ATP glycolysis?",o:["2","4","6","8"],a:0},
{q:"G6PD deficiency affects?",o:["Glycolysis","HMP shunt","TCA","Gluconeogenesis"],a:1},
{q:"Ketone body site?",o:["Liver","Brain","Muscle","Kidney"],a:0},
{q:"Final ETC acceptor?",o:["NADH","O2","FADH2","CoQ"],a:1}
];

/* STATE */
let idx=0;
let ans=Array(qs.length).fill(null);
let status=Array(qs.length).fill("notvisited");
let marked=Array(qs.length).fill(false);
let t=1200;
let timer;

/* TIMER */
function startTimer(){
timer=setInterval(()=>{
if(t<=0){submitExam();return;}

t--;

if(t<120) document.getElementById("timer").classList.add("warn");

let m=Math.floor(t/60);
let s=t%60;
document.getElementById("timer").innerText=
String(m).padStart(2,'0')+":"+String(s).padStart(2,'0');

},1000);
}

/* RENDER */
function renderQ(){

status[idx] = ans[idx] != null ? "answered" : "visited";

document.getElementById("qtext").innerText =
(idx+1)+". "+qs[idx].q;

let h="";
qs[idx].o.forEach((o,i)=>{
h+=`
<button class="opt ${ans[idx]===i?'selected':''}"
onclick="select(${i})">
${o}
</button>`;
});

document.getElementById("opts").innerHTML=h;
renderPalette();
}

/* OPTIONS */
function select(i){
ans[idx]=i;
renderQ();
}

/* NAV */
function nextQ(){
if(idx<qs.length-1) idx++;
renderQ();
}

function prevQ(){
if(idx>0) idx--;
renderQ();
}

/* MARK */
function mark(){
marked[idx]=true;
renderPalette();
}

/* PALETTE */
function renderPalette(){
let h="";
qs.forEach((q,i)=>{
let cls="notvisited";

if(marked[i]) cls="marked";
else if(ans[i]!=null) cls="answered";
else if(status[i]=="visited") cls="visited";

h+=`
<button class="${cls}" onclick="jump(${i})">
${i+1}
</button>`;
});
document.getElementById("palette").innerHTML=h;
}

function jump(i){
idx=i;
renderQ();
}

/* SUBMIT */
function submitExam(){
clearInterval(timer);

let score=0;
ans.forEach((a,i)=>{
if(a===qs[i].a) score++;
});

let percent = (score/qs.length*100).toFixed(2);

document.getElementById("result").innerHTML=`
<h2>Result</h2>
<p>Score: ${score}/${qs.length}</p>
<p>Percentage: ${percent}%</p>
`;

}

/* START */
function startExam(){
let name=document.getElementById("studentName").value;
if(!name){alert("Enter name");return;}

document.getElementById("loginBox").style.display="none";
document.getElementById("examArea").style.display="block";

startTimer();
renderQ();
}

</script>

</body>
</html>
