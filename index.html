<style>
body{font-family:Arial;max-width:900px;margin:auto;padding:20px;}
.top{display:flex;justify-content:space-between;align-items:center;}
.palette{display:grid;grid-template-columns:repeat(10, 1fr);gap:6px;margin:15px 0;}
.palette button{width:100%;aspect-ratio:1;border-radius:8px;border:2px solid #999;font-weight:bold;cursor:pointer;}
.not-visited{ background:#fff; }
.not-answered{ background:#fff; border-color:#999; }
.answered{ background:#c8f7c5; border-color:#2e7d32; }
.marked{ background:#e1bee7; border-color:#6a1b9a; }
.marked-answered{ background:#ffcdd2; border-color:#c62828; }
.current{ box-shadow:0 0 0 3px #2196f3; }
.legend{display:flex;flex-wrap:wrap;gap:15px;margin:10px 0;font-size:13px;}
.legend-item{display:flex; align-items:center; gap:5px;}
.legend-box{width:18px; height:18px; border:2px solid #999; border-radius:4px;}
.box{border:1px solid #ccc;padding:18px;border-radius:18px;margin-top:10px;}
.opt{display:block;width:100%;padding:12px;margin:8px 0;border-radius:12px;border:1px solid #999;background:#fff;cursor:pointer;text-align:left;}
.opt:hover{ background:#f3f3f3; }
.opt:disabled{ cursor:not-allowed; opacity:0.6; }
.opt.selected{ background:#c8f7c5; border-color:#2e7d32; font-weight:bold; }
.nav{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;}
.nav button{padding:10px 16px;border-radius:8px;border:1px solid #666;cursor:pointer;}
#markBtn{ background:#e1bee7; }
.panel{margin-top:20px;padding:15px;border:1px solid #ddd;border-radius:12px;}
.small{font-size:14px;color:#444;margin:4px 0;}
</style>
</head>
